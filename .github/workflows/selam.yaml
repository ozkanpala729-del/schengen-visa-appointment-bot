name: Selam Gönder

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  selam:
    runs-on: ubuntu-latest
    steps:
      - name: Telegram'a Selam Gönder
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="👋 Selam!"
