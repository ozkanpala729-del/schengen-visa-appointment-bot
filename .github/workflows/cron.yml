name: Randevu Kontrol Cron

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-appointments:
    runs-on: ubuntu-latest
    steps:
      - name: Randevu Kontrol API'yi Çağır
        run: |
          curl -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/check" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --fail \
            --silent \
            --show-error
